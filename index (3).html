<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>連連看</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #ffffff;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px #e94560;
            letter-spacing: 5px;
        }

        .game-info {
            display: flex;
            gap: 40px;
            margin-bottom: 20px;
            font-size: 1.3rem;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .info-item span {
            color: #e94560;
            font-weight: bold;
            min-width: 60px;
        }

        .game-container {
            position: relative;
            background: #16213e;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .board {
            display: grid;
            grid-template-columns: repeat(12, 50px);
            grid-template-rows: repeat(8, 50px);
            gap: 4px;
            position: relative;
        }

        .card {
            width: 50px;
            height: 50px;
            background: #0f3460;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            transition: all 0.3s ease;
            user-select: none;
            border: 2px solid transparent;
        }

        .card:hover {
            transform: scale(1.05);
            background: #1a4a7a;
        }

        .card.selected {
            border-color: #e94560;
            background: #1a4a7a;
            box-shadow: 0 0 15px #e94560;
            transform: scale(1.1);
        }

        .card.matched {
            opacity: 0;
            pointer-events: none;
            transform: scale(0);
        }

        .card.empty {
            background: transparent;
            cursor: default;
            pointer-events: none;
        }

        .line-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .line {
            stroke: #00ff88;
            stroke-width: 4;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
            filter: drop-shadow(0 0 5px #00ff88);
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            padding: 12px 24px;
            font-size: 1rem;
            font-family: 'Noto Sans TC', sans-serif;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            background: #ff6b6b;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(233, 69, 96, 0.4);
        }

        .btn:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-score {
            background: #00ff88;
            color: #1a1a2e;
        }

        .btn-score:hover {
            background: #00cc6a;
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.4);
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: #16213e;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal h2 {
            font-size: 2rem;
            margin-bottom: 20px;
            color: #00ff88;
        }

        .modal p {
            font-size: 1.5rem;
            margin-bottom: 30px;
        }

        .hint-anim {
            animation: hintPulse 0.5s ease infinite alternate;
        }

        @keyframes hintPulse {
            from { transform: scale(1); }
            to { transform: scale(1.15); }
        }

        @media (max-width: 700px) {
            .board {
                grid-template-columns: repeat(12, 35px);
                grid-template-rows: repeat(8, 35px);
            }
            .card {
                width: 35px;
                height: 35px;
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <h1>連連看</h1>
    <div class="game-info">
        <div class="info-item">時間: <span id="timer">180</span>秒</div>
        <div class="info-item">得分: <span id="score">0</span></div>
        <div class="info-item">剩餘: <span id="remaining">48</span>張</div>
    </div>
    <div class="game-container">
        <div class="board" id="board"></div>
        <svg class="line-container" id="lines"></svg>
    </div>
    <div class="controls">
        <button class="btn" id="hintBtn" title="提示 (冷卻10秒)">💡 提示</button>
        <button class="btn" id="shuffleBtn" title="洗牌 (-50分)">🔀 洗牌</button>
        <button class="btn" id="removeBtn" title="消除3對 (-100分)">💥 消除</button>
        <button class="btn btn-score" id="restartBtn">🔄 重新開始</button>
    </div>

    <div class="modal" id="gameOverModal">
        <div class="modal-content">
            <h2 id="modalTitle">遊戲結束</h2>
            <p>最終得分: <span id="finalScore">0</span></p>
            <button class="btn btn-score" onclick="restartGame()">再玩一次</button>
        </div>
    </div>

    <script>
        const ROWS = 8;
        const COLS = 12;
        const ICONS = ['🍎', '🍊', '🍋', '🍇', '🍓', '🍒', '🍑', '🥝', '🍍', '🥭', '🍌', '🍉'];
        
        let board = [];
        let selectedCard = null;
        let score = 0;
        let timeLeft = 180;
        let timerInterval = null;
        let hintCooldown = false;
        let matchedPairs = 0;
        let totalPairs = (ROWS * COLS) / 2;

        function initGame() {
            board = [];
            selectedCard = null;
            score = 0;
            timeLeft = 180;
            matchedPairs = 0;
            hintCooldown = false;
            
            const iconPairs = [];
            for (let i = 0; i < totalPairs; i++) {
                iconPairs.push(ICONS[i % ICONS.length]);
                iconPairs.push(ICONS[i % ICONS.length]);
            }
            
            for (let i = iconPairs.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [iconPairs[i], iconPairs[j]] = [iconPairs[j], iconPairs[i]];
            }
            
            let idx = 0;
            for (let r = 0; r < ROWS; r++) {
                board[r] = [];
                for (let c = 0; c < COLS; c++) {
                    board[r][c] = {
                        icon: iconPairs[idx++],
                        matched: false
                    };
                }
            }
            
            renderBoard();
            updateUI();
            startTimer();
        }

        function renderBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.dataset.row = r;
                    card.dataset.col = c;
                    
                    if (board[r][c].matched) {
                        card.classList.add('empty');
                    } else {
                        card.textContent = board[r][c].icon;
                        card.addEventListener('click', () => handleCardClick(r, c));
                    }
                    
                    boardEl.appendChild(card);
                }
            }
        }

        function handleCardClick(row, col) {
            if (board[row][col].matched) return;
            
            const cards = document.querySelectorAll('.card');
            const clickedCard = cards[row * COLS + col];
            
            if (selectedCard) {
                const [sr, sc] = selectedCard;
                
                if (sr === row && sc === col) {
                    clickedCard.classList.remove('selected');
                    selectedCard = null;
                    return;
                }
                
                if (board[sr][sc].icon === board[row][col].icon) {
                    const path = findPath(sr, sc, row, col);
                    
                    if (path) {
                        drawPath(path);
                        setTimeout(() => {
                            board[sr][sc].matched = true;
                            board[row][col].matched = true;
                            cards[sr * COLS + sc].classList.add('matched');
                            clickedCard.classList.add('matched');
                            selectedCard = null;
                            score += 10;
                            matchedPairs++;
                            clearLines();
                            updateUI();
                            checkWin();
                        }, 300);
                        return;
                    }
                }
                
                cards[sr * COLS + sc].classList.remove('selected');
            }
            
            clickedCard.classList.add('selected');
            selectedCard = [row, col];
        }

        function findPath(r1, c1, r2, c2) {
            if (canConnectDirect(r1, c1, r2, c2)) {
                return [[r1, c1], [r2, c2]];
            }
            
            const oneTurn = findOneTurnPath(r1, c1, r2, c2);
            if (oneTurn) return oneTurn;
            
            const twoTurn = findTwoTurnPath(r1, c1, r2, c2);
            if (twoTurn) return twoTurn;
            
            return null;
        }

        function canConnectDirect(r1, c1, r2, c2) {
            if (r1 === r2) {
                const minC = Math.min(c1, c2);
                const maxC = Math.max(c1, c2);
                for (let c = minC + 1; c < maxC; c++) {
                    if (!board[r1][c].matched && !(r1 === r1 && c === c1) && !(r1 === r2 && c === c2)) return false;
                }
                return true;
            }
            if (c1 === c2) {
                const minR = Math.min(r1, r2);
                const maxR = Math.max(r1, r2);
                for (let r = minR + 1; r < maxR; r++) {
                    if (!board[r][c1].matched && !(r === r1 && c1 === c1) && !(r === r2 && c1 === c2)) return false;
                }
                return true;
            }
            return false;
        }

        function findOneTurnPath(r1, c1, r2, c2) {
            if (canConnectDirect(r1, c1, r1, c2) && canConnectDirect(r1, c2, r2, c2)) {
                if (board[r1][c2].matched || (r1 === r1 && c2 === c1) || (r1 === r2 && c2 === c2)) {
                    if (!board[r1][c2].matched) return [[r1, c1], [r1, c2], [r2, c2]];
                } else if (isEmpty(r1, c2)) {
                    return [[r1, c1], [r1, c2], [r2, c2]];
                }
            }
            
            if (canConnectDirect(r1, c1, r2, c1) && canConnectDirect(r2, c1, r2, c2)) {
                if (isEmpty(r2, c1)) {
                    return [[r1, c1], [r2, c1], [r2, c2]];
                }
            }
            
            return null;
        }

        function findTwoTurnPath(r1, c1, r2, c2) {
            for (let c = -1; c <= COLS; c++) {
                if (c === c1 || c === c2) continue;
                if (isEmpty(r1, c) && canConnectDirect(r1, c1, r1, c) && canConnectDirect(r1, c, r2, c) && canConnectDirect(r2, c, r2, c2)) {
                    return [[r1, c1], [r1, c], [r2, c], [r2, c2]];
                }
            }
            
            for (let r = -1; r <= ROWS; r++) {
                if (r === r1 || r === r2) continue;
                if (isEmpty(r, c1) && canConnectDirect(r1, c1, r, c1) && canConnectDirect(r, c1, r, c2) && canConnectDirect(r, c2, r2, c2)) {
                    return [[r1, c1], [r, c1], [r, c2], [r2, c2]];
                }
            }
            
            return null;
        }

        function isEmpty(r, c) {
            if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return true;
            return board[r][c].matched;
        }

        function drawPath(path) {
            const svg = document.getElementById('lines');
            svg.innerHTML = '';
            
            const cardWidth = 50;
            const gap = 4;
            const offset = 20;
            
            let d = '';
            path.forEach((point, i) => {
                const [r, c] = point;
                const x = c * (cardWidth + gap) + cardWidth / 2 + offset;
                const y = r * (cardWidth + gap) + cardWidth / 2 + offset;
                
                if (i === 0) d += `M ${x} ${y}`;
                else d += ` L ${x} ${y}`;
            });
            
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            line.setAttribute('d', d);
            line.setAttribute('class', 'line');
            svg.appendChild(line);
        }

        function clearLines() {
            document.getElementById('lines').innerHTML = '';
        }

        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('remaining').textContent = (totalPairs - matchedPairs) * 2;
            document.getElementById('timer').textContent = timeLeft;
            
            document.getElementById('shuffleBtn').disabled = score < 50;
            document.getElementById('removeBtn').disabled = score < 100;
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').textContent = timeLeft;
                if (timeLeft <= 0) {
                    endGame(false);
                }
            }, 1000);
        }

        function checkWin() {
            if (matchedPairs === totalPairs) {
                endGame(true);
            }
        }

        function endGame(won) {
            clearInterval(timerInterval);
            document.getElementById('modalTitle').textContent = won ? '🎉 恭喜過關！' : '⏰ 時間到！';
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverModal').classList.add('show');
        }

        function restartGame() {
            document.getElementById('gameOverModal').classList.remove('show');
            initGame();
        }

        function findHint() {
            if (hintCooldown) return;
            
            for (let r1 = 0; r1 < ROWS; r1++) {
                for (let c1 = 0; c1 < COLS; c1++) {
                    if (board[r1][c1].matched) continue;
                    
                    for (let r2 = 0; r2 < ROWS; r2++) {
                        for (let c2 = 0; c2 < COLS; c2++) {
                            if (r1 === r2 && c1 === c2) continue;
                            if (board[r2][c2].matched) continue;
                            
                            if (board[r1][c1].icon === board[r2][c2].icon) {
                                if (findPath(r1, c1, r2, c2)) {
                                    const cards = document.querySelectorAll('.card');
                                    cards[r1 * COLS + c1].classList.add('hint-anim');
                                    cards[r2 * COLS + c2].classList.add('hint-anim');
                                    
                                    setTimeout(() => {
                                        cards[r1 * COLS + c1].classList.remove('hint-anim');
                                        cards[r2 * COLS + c2].classList.remove('hint-anim');
                                    }, 1500);
                                    
                                    hintCooldown = true;
                                    document.getElementById('hintBtn').disabled = true;
                                    setTimeout(() => {
                                        hintCooldown = false;
                                        document.getElementById('hintBtn').disabled = false;
                                    }, 10000);
                                    
                                    return;
                                }
                            }
                        }
                    }
                }
            }
            
            shuffleBoard();
        }

        function shuffleBoard() {
            const icons = [];
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (!board[r][c].matched) {
                        icons.push(board[r][c].icon);
                    }
                }
            }
            
            for (let i = icons.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [icons[i], icons[j]] = [icons[j], icons[i]];
            }
            
            let idx = 0;
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (!board[r][c].matched) {
                        board[r][c].icon = icons[idx++];
                    }
                }
            }
            
            renderBoard();
        }

        function removeThreePairs() {
            const pairs = [];
            
            for (let r1 = 0; r1 < ROWS; r1++) {
                for (let c1 = 0; c1 < COLS; c1++) {
                    if (board[r1][c1].matched) continue;
                    
                    for (let r2 = 0; r2 < ROWS; r2++) {
                        for (let c2 = 0; c2 < COLS; c2++) {
                            if (r1 === r2 && c1 === c2) continue;
                            if (board[r2][c2].matched) continue;
                            
                            if (board[r1][c1].icon === board[r2][c2].icon) {
                                const key = board[r1][c1].icon;
                                if (!pairs.find(p => p.key === key)) {
                                    pairs.push({ key, r1, c1, r2, c2 });
                                }
                            }
                        }
                    }
                }
            }
            
            for (let i = 0; i < 3 && i < pairs.length; i++) {
                const p = pairs[i];
                board[p.r1][p.c1].matched = true;
                board[p.r2][p.c2].matched = true;
            }
            
            score -= 100;
            matchedPairs += Math.min(3, pairs.length);
            renderBoard();
            updateUI();
            checkWin();
        }

        document.getElementById('hintBtn').addEventListener('click', findHint);
        document.getElementById('shuffleBtn').addEventListener('click', () => {
            if (score >= 50) {
                score -= 50;
                shuffleBoard();
                updateUI();
            }
        });
        document.getElementById('removeBtn').addEventListener('click', () => {
            if (score >= 100) {
                removeThreePairs();
            }
        });
        document.getElementById('restartBtn').addEventListener('click', restartGame);

        initGame();
    </script>
</body>
</html>
